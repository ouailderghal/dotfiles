# change prefix key
set-option -g prefix C-s
unbind-key C-b 
bind-key C-s send-prefix

# default shell and terminal
set-option -g default-shell /bin/zsh
set-option -g default-terminal "xterm-256color"
set-option -g default-command "zsh -i"

# Set colorset option
set-option -ga terminal-overrides ",xterm-256color:Tc"

# start window and pane count from 1
set-option -g base-index 1
set-option -g pane-base-index 1
set-option -g renumber-windows on

# enable mouse mode
set-option -g mouse on

# faster escape when using vim
set-option -g escape-time 0

# enable clipboard
set-option -g set-clipboard on

# split windows
bind-key v split-window -h
bind-key h split-window -v

# swap windows
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# move between windows
bind-key -n S-Left previous-window
bind-key -n S-Right next-window

# move between panes
bind-key -n M-Up select-pane -U
bind-key -n M-Down select-pane -D
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R

# config file reload
bind-key r source-file $HOME/.config/tmux/tmux.conf \; display-message "Config file reloaded."

# Status Bar
set -g status-style "bg=green,fg=black"
set -g status-justify centre
set -g status-interval 60
set -g status-left-length 50
set -g status-right-length 60
set -g status-left "#[bold][[#S]]#[nobold]"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[fg=magenta,bold]→#I:#W←#[fg=white,nobold] "
set -g status-right "#{battery_status_bg} 󰂀 #{battery_percentage} | %d %b %Y | #[bold]%H:%M#[nobold] "

# List of plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-battery"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
run "~/.config/tmux/plugins/tpm/tpm"
